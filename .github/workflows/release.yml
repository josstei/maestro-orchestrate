name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Generate runtime adapters
        run: node scripts/generate.js

      - name: Check adapter drift
        run: |
          if ! git diff --exit-code --name-only; then
            echo "::error::Runtime adapters are out of sync with canonical src. Run 'node scripts/generate.js' and commit the changes."
            git diff --stat
            exit 1
          fi

      - name: Run full test suite
        run: node --test tests/unit/*.test.js tests/transforms/*.test.js tests/integration/*.test.js

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          ESCAPED_TAG=$(printf '%s' "$TAG" | sed 's/[.[\\]\\(*+?{|^$]/\\&/g')
          NOTES=$(awk "/^## \[${ESCAPED_TAG}\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md)
          DELIMITER="CHANGELOG_NOTES_$(date +%s)"
          {
            echo "notes<<$DELIMITER"
            echo "$NOTES"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          name: ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: false

      - name: Publish to npm
        if: secrets.NPM_TOKEN != ''
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
