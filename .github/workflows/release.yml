name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Stable version to recover, for example 1.6.4'
        required: true
        type: string
      target_sha:
        description: 'Commit SHA to release; defaults to refs/tags/v<version>'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout push commit
        if: github.event_name == 'push'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Checkout recovery target
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_sha || format('refs/tags/v{0}', inputs.version) }}

      - name: Resolve release context
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            echo "pr_title=release: v${INPUT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "pr_head_ref=release/v${INPUT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "recovery=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_JSON=$(gh api -H "Accept: application/vnd.github+json" "repos/$REPOSITORY/commits/$GITHUB_SHA/pulls" | \
            jq -c --arg sha "$GITHUB_SHA" \
              '[.[] | select(.merged_at != null and .merge_commit_sha == $sha and .base.ref == "main" and (.labels | map(.name) | index("release")))] | .[0]')

          if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "No labeled release PR found for commit $GITHUB_SHA. Skipping."
            exit 0
          fi

          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
          echo "pr_title=$(echo "$PR_JSON" | jq -r '.title')" >> "$GITHUB_OUTPUT"
          echo "pr_head_ref=$(echo "$PR_JSON" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"
          echo "recovery=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.is_release == 'true'
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm token
        if: steps.detect.outputs.is_release == 'true'
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN is required for stable release publishing"
            exit 1
          fi

      - name: Extract and validate version
        if: steps.detect.outputs.is_release == 'true'
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TARGET_SHA: ${{ inputs.target_sha }}
          INPUT_VERSION: ${{ inputs.version }}
          PR_HEAD_REF: ${{ steps.detect.outputs.pr_head_ref }}
          PR_TITLE: ${{ steps.detect.outputs.pr_title }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TARGET_SHA=$(git rev-parse HEAD)
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

          if [[ ! "$PKG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release workflow only publishes stable semver versions; found $PKG_VERSION"
            exit 1
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$PKG_VERSION" != "$INPUT_VERSION" ]; then
              echo "::error::package.json version ($PKG_VERSION) does not match manual recovery version ($INPUT_VERSION)"
              exit 1
            fi

            if [ -n "$INPUT_TARGET_SHA" ] && [ "$TARGET_SHA" != "$INPUT_TARGET_SHA" ]; then
              echo "::error::Checked-out commit ($TARGET_SHA) does not match manual recovery target_sha ($INPUT_TARGET_SHA)"
              exit 1
            fi
          fi

          if ! grep -Fq "## [$PKG_VERSION]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing section for [$PKG_VERSION]"
            exit 1
          fi

          if [[ "$PR_HEAD_REF" =~ ^release/v(.+)$ ]]; then
            BRANCH_VERSION="${BASH_REMATCH[1]}"
            if [ "$PKG_VERSION" != "$BRANCH_VERSION" ]; then
              echo "::error::package.json version ($PKG_VERSION) does not match release branch version ($BRANCH_VERSION)"
              exit 1
            fi
          fi

          if [[ "$PR_TITLE" =~ ^release:\ v(.+)$ ]]; then
            TITLE_VERSION="${BASH_REMATCH[1]}"
            if [ "$PKG_VERSION" != "$TITLE_VERSION" ]; then
              echo "::error::package.json version ($PKG_VERSION) does not match PR title version ($TITLE_VERSION)"
              exit 1
            fi
          fi

          TAG="v${PKG_VERSION}"
          TAG_SHA=$(git rev-parse "$TAG^{commit}" 2>/dev/null || true)
          if [ -n "$TAG_SHA" ]; then
            if [ "$TAG_SHA" != "$TARGET_SHA" ]; then
              echo "::error::Tag $TAG exists at $TAG_SHA, not target commit $TARGET_SHA"
              exit 1
            fi
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "::error::Manual release recovery requires existing tag $TAG"
            exit 1
          fi

      - name: Generate runtime adapters
        if: steps.detect.outputs.is_release == 'true'
        run: node scripts/generate.js

      - name: Check adapter drift
        if: steps.detect.outputs.is_release == 'true'
        run: |
          if ! git diff --exit-code --name-only; then
            echo "::error::Runtime adapters are out of sync with canonical src. Run 'node scripts/generate.js' and commit the changes."
            git diff --stat
            exit 1
          fi

      - name: Run full test suite
        if: steps.detect.outputs.is_release == 'true'
        run: node --test tests/unit/*.test.js tests/transforms/*.test.js tests/integration/*.test.js

      - name: Verify npm package contents
        if: steps.detect.outputs.is_release == 'true'
        run: npm run pack:verify

      - name: Package release artifact
        if: steps.detect.outputs.is_release == 'true'
        run: npm run release:artifacts

      - name: Verify release artifact
        if: steps.detect.outputs.is_release == 'true'
        run: npm run release:verify-artifacts

      - name: Create and push tag
        if: steps.detect.outputs.is_release == 'true'
        env:
          TARGET_SHA: ${{ steps.version.outputs.target_sha }}
          VERSION: v${{ steps.version.outputs.version }}
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ "$CURRENT_SHA" != "$TARGET_SHA" ]; then
            echo "::error::Checked-out commit changed from $TARGET_SHA to $CURRENT_SHA"
            exit 1
          fi

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            EXISTING_SHA=$(git rev-parse "$VERSION^{commit}")
            if [ "$EXISTING_SHA" = "$TARGET_SHA" ]; then
              echo "Tag $VERSION already exists at $EXISTING_SHA. Skipping."
              exit 0
            fi

            echo "::error::Tag $VERSION already exists at $EXISTING_SHA, not $TARGET_SHA"
            exit 1
          fi

          git tag "$VERSION" "$TARGET_SHA"
          git push origin "$VERSION"

      - name: Publish to npm
        if: steps.detect.outputs.is_release == 'true'
        run: node scripts/npm-publish-idempotent.js --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Extract changelog for version
        if: steps.detect.outputs.is_release == 'true'
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          NOTES=$(awk -v version="$VERSION" '
            index($0, "## [" version "]") == 1 { found=1; next }
            /^## \[/ && found { exit }
            found { print }
          ' CHANGELOG.md)
          DELIMITER="CHANGELOG_NOTES_$(date +%s)"
          {
            echo "notes<<$DELIMITER"
            echo "$NOTES"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.detect.outputs.is_release == 'true'
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ steps.version.outputs.target_sha }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: false
          files: dist/release/maestro-v${{ steps.version.outputs.version }}-extension.tar.gz
