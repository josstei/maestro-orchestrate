name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (leave empty for auto-inference from commits)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::This workflow must be run from the main branch"
          exit 1

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Infer version from commits
        if: inputs.version == ''
        id: infer
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          LOGS=$(git log "v${CURRENT}..HEAD" --oneline 2>/dev/null || git log --oneline -50)
          BUMP="patch"

          if echo "$LOGS" | grep -qiE 'BREAKING CHANGE|!:'; then
            BUMP="major"
          elif echo "$LOGS" | grep -qiE '^[a-f0-9]+ feat'; then
            BUMP="minor"
          fi

          case "$BUMP" in
            major) NEXT="$((MAJOR + 1)).0.0" ;;
            minor) NEXT="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Inferred version: $NEXT (bump: $BUMP)"

      - name: Resolve target version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INFERRED_VERSION: ${{ steps.infer.outputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$INFERRED_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate target version
        env:
          TARGET_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ ! "$TARGET_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must match major.minor.patch; received '$TARGET_VERSION'"
            exit 1
          fi

      - name: Validate CHANGELOG has unreleased content
        run: |
          if ! awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{exit} found && /\S/{has=1} END{exit !has}' CHANGELOG.md; then
            echo "::error::CHANGELOG [Unreleased] section has no content"
            exit 1
          fi

      - name: Generate and check drift
        run: |
          node scripts/generate.js
          if ! git diff --exit-code --name-only; then
            echo "::error::Generated files have drift on main. Fix before releasing."
            git diff --stat
            exit 1
          fi

      - name: Run full test suite
        run: node --test tests/unit/*.test.js tests/transforms/*.test.js tests/integration/*.test.js

      - name: Create release branch
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git checkout -b "release/v${VERSION}"

      - name: Update version files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: node scripts/update-versions.js "$VERSION"

      - name: Regenerate with new version
        run: |
          node scripts/generate.js
          npm install --package-lock-only

      - name: Commit release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v${VERSION}"

      - name: Push release branch
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git push origin "release/v${VERSION}"

      - name: Open release PR to main
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CHANGELOG_EXCERPT=$(awk -v version="$VERSION" '
            index($0, "## [" version "]") == 1 { found=1; next }
            /^## \[/ && found { exit }
            found { print }
          ' CHANGELOG.md)
          gh pr create \
            --repo "$REPOSITORY" \
            --base main \
            --head "release/v${VERSION}" \
            --title "release: v${VERSION}" \
            --body "$(cat <<EOF
          ## Release v${VERSION}

          ${CHANGELOG_EXCERPT}
          EOF
          )"

      - name: Label release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "$REPOSITORY" \
            --base main \
            --head "release/v${VERSION}" \
            --json number \
            --jq '.[0].number')
          gh pr edit \
            --repo "$REPOSITORY" \
            "$PR_NUMBER" \
            --add-label release \
            --add-label rc
