name: Generator Drift Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-generator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run generator
        run: node scripts/generate.js

      - name: Check for drift
        run: |
          if ! git diff --exit-code --name-only; then
            echo "::error::Generated files are out of sync with source. Run 'node scripts/generate.js' and commit the changes."
            git diff --stat
            exit 1
          fi

      - name: Run tests
        run: node --test tests/transforms/copy.test.js tests/transforms/strip-feature.test.js tests/transforms/replace-agent-names.test.js tests/transforms/replace-tool-names.test.js tests/transforms/replace-paths.test.js tests/transforms/inject-frontmatter.test.js tests/transforms/skill-metadata.test.js tests/integration/generator.test.js tests/integration/zero-diff.test.js
