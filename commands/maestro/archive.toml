description = "Archive the current active orchestration session"

prompt = """Archive the current active orchestration session.

Activate the `session-management` skill and follow its archive protocol.

## Execution

1. Call `get_session_status` to check for an active session. If no session exists, inform the user there is nothing to archive.
2. If an active session exists:
   - Present a brief summary of what will be archived (session ID, task, phase progress)
   - Ask the user to confirm archival (the session may have incomplete phases)
   - Call `archive_session` with the session ID — this MCP tool handles moving the session state file, design document, and implementation plan to their respective archive directories
   - Verify the response indicates success and report the archived files to the user"""
